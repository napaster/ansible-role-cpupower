---
- name: "cpupower | Deploy cpupower configuration"
  ansible.builtin.template:
    src: "{{ 'cpupower_' +
      hostvars[inventory_hostname]['ansible_facts']['os_family'] + '.j2' }}"
    dest: "{{ hostvars[inventory_hostname]['cpupower_conf_dest'] }}"
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - "Restart cpupower"
- name: "cpupower | Deploy systemd service for Debian"
  ansible.builtin.template:
    src: "cpupower.service_Debian.j2"
    dest: "/etc/systemd/system/{{ hostvars[inventory_hostname]['cpupower_service'] }}.service"
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - "Restart cpupower"
  when:
    - "hostvars[inventory_hostname]['ansible_facts']['os_family'] == 'Debian'"
- name: "cpupower | Enable cpupower service"
  ansible.builtin.systemd:
    name: "{{ hostvars[inventory_hostname]['cpupower_service'] }}"
    enabled: "yes"
    daemon_reload: "yes"
  when:
    - "hostvars[inventory_hostname]['cpupower'] is defined"
    - "hostvars[inventory_hostname]['cpupower'] not in ['', [], '[]', None]"
    - "hostvars[inventory_hostname]['cpupower'] |
       community.general.json_query(lookup('ansible.builtin.vars',
      'cpupower_enable', default='')) == 'true'"
  vars:
    cpupower_enable: "[] | map(&enable || 'false', @) | [0]"
